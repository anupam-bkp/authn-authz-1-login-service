<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f5f5f5;
        }

        .card {
            width: 320px;
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 2px 10px rgba(0,0,0,.15);
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            cursor: pointer;
        }

        #message {
            margin-top: 12px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Login</h2>

    <form id="loginForm">
        <input
                id="username"
                type="text"
                placeholder="Username"
                required>

        <input
                id="password"
                type="password"
                placeholder="Password"
                required>

        <button type="submit">
            Login
        </button>
    </form>

    <div id="message"></div>
</div>

<script>
    document.getElementById("loginForm")
        .addEventListener("submit", async (e) => {

            e.preventDefault();

            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            const response = await fetch("/v1/login/auth", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username, password
                })
            });

            const result = await response.json();
            if(result.invalidMsg){
                document.getElementById("message").innerText = result.invalidMsg;
            }else{
                window.location.href = result.redirectUrl;
            }
        });
</script>

</body>
</html>
